<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | RK Consulting</title>

  <!-- Redirect map: runs before anything renders -->
  <script>
    (function () {
      var redirects = {
        '/airtable': '/pages/airtable.html'
        // Add more here as needed, e.g.:
        '/power-bi': '/pages/power-bi.html',
		'/looker-studio': '/pages/looker-studio.html',
		'/spreadsheets': '/pages/spreadsheets.html',
        '/contact':  '/pages/contact.html'
      };

      var path = window.location.pathname.replace(/\/$/, ''); // strip trailing slash
      var dest  = redirects[path];

      if (dest) {
        // Preserve any query string / hash from the original URL
        window.location.replace(dest + window.location.search + window.location.hash);
      }
    })();
  </script>

  <!-- Fallback meta-refresh for crawlers that don't run JS -->
  <!-- This is overridden per-path by the JS above; for the generic 404 it just stays on this page -->
  <link rel="canonical" href="https://www.rkconsulting.co.nz/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1B3A4B;
      --orange: #ff9f1c;
      --white:  #ffffff;
      --light:  #f5f7f9;
      --muted:  #6b7c88;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--light);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      padding: 1rem 2rem;
    }
    header a {
      display: inline-block;
    }
    header img {
      height: 65px;
      width: auto;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(27,58,75,0.08);
    }

    .error-code {
      font-family: 'Sora', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--orange);
      letter-spacing: -4px;
    }

    .card h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin: 1rem 0 0.75rem;
      color: var(--navy);
    }

    .card p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-group {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: var(--orange);
      color: var(--white);
    }
    .btn-secondary {
      background: transparent;
      color: var(--navy);
      border: 2px solid var(--navy);
    }

    /* ── Footer ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 1.25rem;
      font-size: 0.85rem;
    }
    footer a { color: var(--orange); text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <a href="/">
      <!-- Replace src with your actual logo path if different -->
      <img src="https://www.rkconsulting.co.nz/images/logo.png" alt="RK Consulting" />
    </a>
  </header>

  <main>
    <div class="card">
      <div class="error-code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for may have moved or no longer exists. Try heading back to the homepage or get in touch.</p>
      <div class="btn-group">
        <a href="https://www.rkconsulting.co.nz" class="btn btn-primary">Go to Homepage</a>
        <a href="https://www.rkconsulting.co.nz/pages/contact.html" class="btn btn-secondary">Contact Us</a>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 RK Consulting Limited &nbsp;|&nbsp;
     <a href="https://www.rkconsulting.co.nz">rkconsulting.co.nz</a>
  </footer>

</body>
</html>
